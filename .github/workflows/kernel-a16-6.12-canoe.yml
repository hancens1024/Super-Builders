name: "Android 16 - Kernel 6.12 (Canoe Source)"

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Canoe common branch"
        type: choice
        options:
          - android16-6.12-2025-06
        default: android16-6.12-2025-06
      sukisu_branch:
        description: "SukiSU branch"
        type: choice
        options:
          - susfs-stable
          - susfs-dev
        default: susfs-stable
      add_susfs:
        description: "Add SUSFS"
        type: boolean
        default: true
      add_vfs:
        description: "Add VFS / manual hooks"
        type: boolean
        default: true
      add_kpm:
        description: "Patch Image with patch_linux"
        type: boolean
        default: false

jobs:
  build:
    name: "Canoe ${{ inputs.source_branch }}"
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    - name: Free Disk Space
      uses: endersonmenezes/free-disk-space@v3
      with:
        remove_android: true
        remove_dotnet: true
        remove_haskell: true
        remove_tool_cache: true
        remove_swap: true
        remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
        remove_packages_one_command: true
        remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
        rm_cmd: "rmz"
        rmz_version: "3.1.1"
        testing: false

    - name: Install Build Dependencies
      run: |
        sudo apt-get update -y -qq
        sudo apt-get install -y -qq lld binutils git curl python3
        curl -sSL https://storage.googleapis.com/git-repo-downloads/repo -o /tmp/repo
        chmod +x /tmp/repo
        sudo mv /tmp/repo /usr/local/bin/repo

    - name: Prepare Workspace
      run: |
        echo "WORKDIR=$GITHUB_WORKSPACE/canoe-work" >> "$GITHUB_ENV"
        echo "KERNEL_ROOT=$GITHUB_WORKSPACE/canoe-work/kernel" >> "$GITHUB_ENV"
        echo "ANYKERNEL3=$GITHUB_WORKSPACE/canoe-work/AnyKernel3-KernelSU-Next" >> "$GITHUB_ENV"
        echo "FRAGMENT=$GITHUB_WORKSPACE/canoe-work/kernel/common/canoe_gki.fragment" >> "$GITHUB_ENV"
        mkdir -p "$GITHUB_WORKSPACE/canoe-work"

    - name: Sync Android Kernel Workspace
      run: |
        cd "$WORKDIR"
        mkdir -p kernel
        cd kernel
        repo init -u https://android.googlesource.com/kernel/manifest \
          -b common-android16-6.12-2025-06 --depth=1
        repo sync -c -j"$(nproc --all)" --fail-fast --no-tags --force-sync --no-clone-bundle

    - name: Replace common With Canoe Source
      run: |
        cd "$KERNEL_ROOT/common"
        git remote add canoe https://github.com/schqiushui/android_kernel_common_android16-6.12.git
        git fetch --depth=1 canoe "${{ inputs.source_branch }}"
        git checkout -B "${{ inputs.source_branch }}" FETCH_HEAD

    - name: Setup SukiSU
      env:
        SUKISU_BRANCH: ${{ inputs.sukisu_branch }}
      run: |
        cd "$KERNEL_ROOT"
        curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s "$SUKISU_BRANCH"

        PIN="$(cat "$GITHUB_WORKSPACE/android16-6.12/sukisu-pin.txt")"
        cd "$KERNEL_ROOT/KernelSU"
        git fetch origin
        git checkout "$PIN"

        KSU_VERSION=$(expr "$(/usr/bin/git rev-list --count main)" + 10606)
        echo "KSUVER=$KSU_VERSION" >> "$GITHUB_ENV"
        export KSU_VERSION="$KSU_VERSION"
        sed -i "s/DKSU_VERSION=12800/DKSU_VERSION=${KSU_VERSION}/" kernel/Makefile

    - name: Apply SUSFS Patch
      if: inputs.add_susfs
      run: |
        PATCH_DIR="$GITHUB_WORKSPACE/android16-6.12/SukiSU-Ultra/patches"
        cd "$KERNEL_ROOT/common"
        patch -p1 -F3 --no-backup-if-mismatch < "$PATCH_DIR/50_add_susfs_in_gki-android16-6.12.patch"
        patch -p1 -F3 --no-backup-if-mismatch < "$PATCH_DIR/51_enhanced_susfs-android16-6.12.patch"

    - name: Apply KSU Safety Patch
      if: inputs.add_susfs
      run: |
        PATCH_DIR="$GITHUB_WORKSPACE/android16-6.12/SukiSU-Ultra/patches"
        cd "$KERNEL_ROOT/KernelSU"
        if patch -p1 --dry-run --forward --no-backup-if-mismatch < "$PATCH_DIR/70_ksu_safety-sukisu-6.12.patch"; then
          patch -p1 --forward --no-backup-if-mismatch < "$PATCH_DIR/70_ksu_safety-sukisu-6.12.patch"
        else
          echo "70_ksu_safety-sukisu-6.12.patch already applied or not needed; skipping"
        fi

    - name: Fix SUSFS Compatibility
      if: inputs.add_susfs
      run: |
        bash "$GITHUB_WORKSPACE/android16-6.12/build-helpers/fix-susfs-compat.sh" \
          "$KERNEL_ROOT/common" "23" "android16" "6.12" ""

    - name: Apply VFS Hook Patch
      if: inputs.add_vfs
      run: |
        cp "$GITHUB_WORKSPACE/android16-6.12/SukiSU-Ultra/patches/60_zeromount-android16-6.12.patch" "$KERNEL_ROOT/common/"
        cd "$KERNEL_ROOT/common"
        patch -p1 -F3 --no-backup-if-mismatch < 60_zeromount-android16-6.12.patch

    - name: Build Defconfig Fragment
      env:
        ADD_VFS: ${{ inputs.add_vfs }}
      run: |
        printf '%s\n' \
          'CONFIG_KSU=y' \
          'CONFIG_KPM=y' \
          'CONFIG_KSU_SUSFS=y' \
          'CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y' \
          'CONFIG_KSU_SUSFS_SUS_PATH=y' \
          'CONFIG_KSU_SUSFS_SUS_MOUNT=y' \
          'CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y' \
          'CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y' \
          'CONFIG_KSU_SUSFS_SUS_KSTAT=y' \
          'CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n' \
          'CONFIG_KSU_SUSFS_TRY_UMOUNT=y' \
          'CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y' \
          'CONFIG_KSU_SUSFS_SPOOF_UNAME=y' \
          'CONFIG_KSU_SUSFS_ENABLE_LOG=y' \
          'CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y' \
          'CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y' \
          'CONFIG_KSU_SUSFS_OPEN_REDIRECT=y' \
          > "$FRAGMENT"

        if [ "$ADD_VFS" = "true" ]; then
          printf '%s\n' \
            'CONFIG_KSU_SUSFS_SUS_SU=n' \
            'CONFIG_KSU_MANUAL_HOOK=y' \
            >> "$FRAGMENT"
        else
          printf '%s\n' \
            'CONFIG_KSU_SUSFS_SUS_SU=y' \
            'CONFIG_KSU_MANUAL_HOOK=n' \
            >> "$FRAGMENT"
        fi

    - name: Sanitize Defconfig Fragment
      run: |
        while IFS='=' read -r cfg _; do
          symbol="${cfg#CONFIG_}"
          grep -Rqx "config ${symbol}" "$KERNEL_ROOT/common" "$KERNEL_ROOT/KernelSU" \
            --include='Kconfig*' 2>/dev/null && continue
          sed -i "/^${cfg}=/d" "$FRAGMENT"
        done < <(grep '^CONFIG_KSU_' "$FRAGMENT" || true)

    - name: Install Bazelisk
      run: |
        curl -L -o /tmp/bazelisk https://github.com/bazelbuild/bazelisk/releases/download/v1.25.0/bazelisk-linux-amd64
        chmod +x /tmp/bazelisk
        sudo mv /tmp/bazelisk /usr/local/bin/bazel

    - name: Build Kernel
      run: |
        cd "$KERNEL_ROOT"
        if [ -f common/tools/bpf/resolve_btfids/Makefile ]; then
          echo 'override KBUILD_HOSTLDFLAGS += --sysroot=/' >> common/tools/bpf/resolve_btfids/Makefile
          echo 'override LDFLAGS += --sysroot=/' >> common/tools/bpf/resolve_btfids/Makefile
        fi
        bazel build --config=fast --lto=none \
          --defconfig_fragment=//common:$(basename "$FRAGMENT") \
          //common:kernel_aarch64_dist

    - name: Clone AnyKernel3
      run: |
        git clone --depth=1 -b gki-2.0 \
          https://github.com/schqiushui/AnyKernel3-KernelSU-Next.git \
          "$ANYKERNEL3"
        rm -rf "$ANYKERNEL3/.git"

    - name: Copy Image Into AnyKernel3
      run: |
        IMAGE_PATH="$KERNEL_ROOT/bazel-bin/common/kernel_aarch64/Image"
        test -f "$IMAGE_PATH"
        cp "$IMAGE_PATH" "$ANYKERNEL3/Image"
        mkdir -p "$WORKDIR/image_output"
        cp "$IMAGE_PATH" "$WORKDIR/image_output/Image"

    - name: Apply patch_linux
      if: inputs.add_kpm
      run: |
        cd "$WORKDIR/image_output"
        curl -LO https://github.com/SukiSU-Ultra/SukiSU_KernelPatch_patch/releases/download/0.11-beta/patch_linux
        chmod +x patch_linux
        ./patch_linux
        cp oImage "$ANYKERNEL3/Image"

    - name: Format Artifact Names
      run: |
        DATE="$(date +'%Y%m%d-%H%M')"
        echo "DATE=$DATE" >> "$GITHUB_ENV"
        echo "ARTIFACT_BASE=AK3-${{ inputs.source_branch }}-canoe-gki-${KSUVER:-unknown}-${DATE}" >> "$GITHUB_ENV"

    - name: Upload AnyKernel3 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ARTIFACT_BASE }}
        path: ${{ env.ANYKERNEL3 }}/*

    - name: Create AnyKernel3 Zip
      run: |
        cd "$ANYKERNEL3"
        zip -r "$WORKDIR/${ARTIFACT_BASE}.zip" *

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: "Canoe Kernel Release ${{ env.DATE }}"
        tag_name: ${{ env.DATE }}
        body: |
          - Source branch: `${{ inputs.source_branch }}`
          - Workspace base: `common-android16-6.12-2025-06`
          - SukiSU branch: `${{ inputs.sukisu_branch }}`
          - SUSFS: `${{ inputs.add_susfs }}`
          - VFS hooks: `${{ inputs.add_vfs }}`
          - KPM patch_linux: `${{ inputs.add_kpm }}`
          - KSU version: `${{ env.KSUVER }}`
        files: |
          ${{ env.WORKDIR }}/${{ env.ARTIFACT_BASE }}.zip
          ${{ env.WORKDIR }}/image_output/Image
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
